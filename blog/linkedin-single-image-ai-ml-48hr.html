<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DianApps LinkedIn Ad - AI/ML Engineer 48 Hours</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 40px; }
  h1 { color: #fff; font-size: 20px; opacity: 0.4; font-weight: 400; }
  .label { color: #6366f1; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  canvas { border: 1px solid #333; max-width: 100%; height: auto; }
  .download-btn { display: inline-block; margin-top: 12px; padding: 12px 28px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .download-btn:hover { opacity: 0.9; }
  .ad-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<h1>LinkedIn Ad — Hire AI/ML Engineer in 48 Hours (Light theme)</h1>

<div class="ad-wrap">
  <div class="label">1200 x 1200 — Square (Recommended)</div>
  <canvas id="c2" width="1200" height="1200"></canvas>
  <button class="download-btn" onclick="dl('c2','dianapps-ai-ml-48hr-square.png')">Download Square (1200x1200)</button>
</div>

<div class="ad-wrap">
  <div class="label">1200 x 627 — LinkedIn Newsfeed</div>
  <canvas id="c1" width="1200" height="627"></canvas>
  <button class="download-btn" onclick="dl('c1','dianapps-ai-ml-48hr-newsfeed.png')">Download Newsfeed (1200x627)</button>
</div>

<script>
function dl(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// Logo as-is (full color, since background is light)
function drawLogoColor(ctx, logo, x, y, h) {
  if (!logo) return;
  const asp = logo.width / logo.height;
  const w = h * asp;
  ctx.drawImage(logo, x, y, w, h);
  return w;
}

// === LIGHT GRADIENT BACKGROUND ===
function drawLightBg(ctx, w, h) {
  // White base
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  // Subtle purple wave at top
  const topG = ctx.createLinearGradient(0, 0, w, 0);
  topG.addColorStop(0, 'rgba(139, 92, 246, 0.08)');
  topG.addColorStop(0.5, 'rgba(99, 102, 241, 0.05)');
  topG.addColorStop(1, 'rgba(139, 92, 246, 0.08)');
  ctx.fillStyle = topG;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(w, 0);
  ctx.lineTo(w, h * 0.35);
  ctx.bezierCurveTo(w * 0.7, h * 0.45, w * 0.3, h * 0.25, 0, h * 0.4);
  ctx.closePath();
  ctx.fill();

  // Soft purple blob top-right
  const blob1 = ctx.createRadialGradient(w * 0.85, h * 0.15, 0, w * 0.85, h * 0.15, w * 0.4);
  blob1.addColorStop(0, 'rgba(139, 92, 246, 0.15)');
  blob1.addColorStop(1, 'transparent');
  ctx.fillStyle = blob1;
  ctx.fillRect(0, 0, w, h);

  // Soft blue blob bottom-left
  const blob2 = ctx.createRadialGradient(w * 0.1, h * 0.9, 0, w * 0.1, h * 0.9, w * 0.35);
  blob2.addColorStop(0, 'rgba(99, 102, 241, 0.1)');
  blob2.addColorStop(1, 'transparent');
  ctx.fillStyle = blob2;
  ctx.fillRect(0, 0, w, h);

  // Subtle dot grid
  ctx.fillStyle = 'rgba(99, 102, 241, 0.08)';
  for (let x = 60; x < w; x += 30) {
    for (let y = 60; y < h; y += 30) {
      ctx.beginPath();
      ctx.arc(x, y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === STOPWATCH ICON (small, for pills) ===
function drawSmallClock(ctx, cx, cy, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;

  // Outer circle
  ctx.beginPath();
  ctx.arc(0, 0, size, 0, Math.PI * 2);
  ctx.stroke();

  // Top button
  ctx.beginPath();
  rr(ctx, -size * 0.25, -size * 1.3, size * 0.5, size * 0.25, 2);
  ctx.fill();

  // Clock hands (12 and 4 position)
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -size * 0.6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size * 0.4, size * 0.3);
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === SHIELD CHECKMARK ICON ===
function drawShieldCheck(ctx, cx, cy, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Shield outline
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.8, -size * 0.6);
  ctx.lineTo(size * 0.8, size * 0.3);
  ctx.quadraticCurveTo(size * 0.8, size * 0.9, 0, size * 1.1);
  ctx.quadraticCurveTo(-size * 0.8, size * 0.9, -size * 0.8, size * 0.3);
  ctx.lineTo(-size * 0.8, -size * 0.6);
  ctx.closePath();
  ctx.stroke();

  // Checkmark inside
  ctx.beginPath();
  ctx.moveTo(-size * 0.35, 0);
  ctx.lineTo(-size * 0.1, size * 0.3);
  ctx.lineTo(size * 0.4, -size * 0.3);
  ctx.stroke();

  ctx.restore();
}

// === SPARK / AI ICON (4-pointed star) ===
function drawSpark(ctx, cx, cy, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = color;

  // 4-pointed star
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.quadraticCurveTo(size * 0.2, -size * 0.2, size, 0);
  ctx.quadraticCurveTo(size * 0.2, size * 0.2, 0, size);
  ctx.quadraticCurveTo(-size * 0.2, size * 0.2, -size, 0);
  ctx.quadraticCurveTo(-size * 0.2, -size * 0.2, 0, -size);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// === FEATURE PILL BOX ===
function drawPill(ctx, x, y, w, h, iconFn, text, accentColor) {
  // Background
  const g = ctx.createLinearGradient(x, y, x + w, y);
  g.addColorStop(0, 'rgba(99, 102, 241, 0.08)');
  g.addColorStop(1, 'rgba(139, 92, 246, 0.05)');
  ctx.fillStyle = g;
  rr(ctx, x, y, w, h, 16);
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(99, 102, 241, 0.2)';
  ctx.lineWidth = 1.5;
  rr(ctx, x, y, w, h, 16);
  ctx.stroke();

  // Icon circle
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x + 36, y + h / 2, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x + 36, y + h / 2, 22, 0, Math.PI * 2);
  ctx.stroke();

  // Draw icon inside circle
  iconFn(ctx, x + 36, y + h / 2, 11, accentColor);

  // Text
  ctx.font = '700 17px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#1f2937';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + 70, y + h / 2);
}

// === DEVELOPER WORKSPACE ILLUSTRATION ===
function drawWorkspace(ctx, cx, cy, scale) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const stroke = '#8b5cf6';
  const accent = '#ec4899';
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;

  // Monitor stand
  ctx.beginPath();
  ctx.moveTo(-30, 110);
  ctx.lineTo(30, 110);
  ctx.lineTo(20, 80);
  ctx.lineTo(-20, 80);
  ctx.closePath();
  ctx.stroke();

  // Monitor base
  ctx.beginPath();
  ctx.moveTo(-60, 120);
  ctx.lineTo(60, 120);
  ctx.stroke();

  // Monitor screen
  ctx.fillStyle = '#1f2937';
  rr(ctx, -130, -90, 260, 170, 8);
  ctx.fill();
  ctx.strokeStyle = accent;
  ctx.lineWidth = 4;
  rr(ctx, -130, -90, 260, 170, 8);
  ctx.stroke();

  // Code lines on screen
  ctx.strokeStyle = '#a5b4fc';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  // Top tabs (3 dots)
  ctx.fillStyle = '#ec4899';
  ctx.beginPath(); ctx.arc(-110, -70, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(-95, -70, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22c55e';
  ctx.beginPath(); ctx.arc(-80, -70, 4, 0, Math.PI * 2); ctx.fill();

  // Code lines (varying lengths)
  ctx.strokeStyle = '#a5b4fc';
  const lines = [
    {x: -110, y: -45, len: 80},
    {x: -100, y: -25, len: 130},
    {x: -110, y: -5, len: 100},
    {x: -90, y: 15, len: 150},
    {x: -100, y: 35, len: 90},
    {x: -110, y: 55, len: 120}
  ];
  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.len, l.y);
    ctx.stroke();
  });

  // Pink accent line
  ctx.strokeStyle = '#ec4899';
  ctx.beginPath();
  ctx.moveTo(-110, -25);
  ctx.lineTo(-105, -25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-100, 15);
  ctx.lineTo(-95, 15);
  ctx.stroke();

  // Keyboard (below monitor)
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  rr(ctx, -110, 145, 220, 50, 6);
  ctx.stroke();

  // Keyboard keys (rows)
  ctx.lineWidth = 1.5;
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 10; col++) {
      const kx = -100 + col * 21;
      const ky = 153 + row * 12;
      rr(ctx, kx, ky, 17, 8, 1);
      ctx.stroke();
    }
  }

  // Hands on keyboard (simplified outline)
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  ctx.fillStyle = 'rgba(139, 92, 246, 0.05)';
  // Left hand
  ctx.beginPath();
  ctx.moveTo(-70, 195);
  ctx.bezierCurveTo(-90, 200, -100, 230, -85, 255);
  ctx.bezierCurveTo(-75, 260, -55, 255, -45, 240);
  ctx.bezierCurveTo(-40, 220, -50, 200, -70, 195);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Fingers (left)
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-78 + i * 8, 195);
    ctx.lineTo(-78 + i * 8, 175);
    ctx.stroke();
  }

  // Right hand
  ctx.beginPath();
  ctx.moveTo(70, 195);
  ctx.bezierCurveTo(90, 200, 100, 230, 85, 255);
  ctx.bezierCurveTo(75, 260, 55, 255, 45, 240);
  ctx.bezierCurveTo(40, 220, 50, 200, 70, 195);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Fingers (right)
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(50 + i * 8, 195);
    ctx.lineTo(50 + i * 8, 175);
    ctx.stroke();
  }

  // Coffee cup (right side)
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  ctx.fillStyle = '#fef3c7';
  ctx.beginPath();
  rr(ctx, 150, 100, 50, 60, 4);
  ctx.fill();
  ctx.stroke();
  // Handle
  ctx.beginPath();
  ctx.arc(208, 130, 12, -Math.PI / 2, Math.PI / 2);
  ctx.stroke();
  // Steam
  ctx.strokeStyle = 'rgba(139, 92, 246, 0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(165, 95);
  ctx.bezierCurveTo(160, 80, 170, 70, 165, 55);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(180, 95);
  ctx.bezierCurveTo(175, 80, 185, 70, 180, 55);
  ctx.stroke();

  // Plant (left side)
  ctx.fillStyle = '#ec4899';
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  // Pot
  ctx.beginPath();
  ctx.moveTo(-200, 130);
  ctx.lineTo(-150, 130);
  ctx.lineTo(-155, 165);
  ctx.lineTo(-195, 165);
  ctx.closePath();
  ctx.fillStyle = '#fef3c7';
  ctx.fill();
  ctx.stroke();
  // Leaves (3 round leaves)
  ctx.fillStyle = '#ec4899';
  ctx.beginPath();
  ctx.arc(-185, 110, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-165, 105, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-150, 115, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === STAR/SPARKLE DECORATIVE ===
function drawStarDeco(ctx, x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  // 4-point sparkle
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.25, -size * 0.25);
  ctx.lineTo(size, 0);
  ctx.lineTo(size * 0.25, size * 0.25);
  ctx.lineTo(0, size);
  ctx.lineTo(-size * 0.25, size * 0.25);
  ctx.lineTo(-size, 0);
  ctx.lineTo(-size * 0.25, -size * 0.25);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// === SQUARE 1200 x 1200 ===
function drawSquare(ctx, logo) {
  const W = 1200, H = 1200;
  drawLightBg(ctx, W, H);

  // Logo top-right
  if (logo) {
    const lh = 60;
    drawLogoColor(ctx, logo, W - 60 - (logo.width / logo.height * lh), 60, lh);
  }

  // Decorative sparkles
  drawStarDeco(ctx, 110, 130, 12, '#8b5cf6');
  drawStarDeco(ctx, 1070, 380, 8, '#ec4899');
  drawStarDeco(ctx, 90, 480, 6, '#06b6d4');
  drawStarDeco(ctx, 1100, 700, 14, '#8b5cf6');

  // === HEADLINE ===
  ctx.textAlign = 'left';
  ctx.font = '900 84px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#1f2937';
  ctx.fillText('Hire an AI/ML', 80, 270);
  ctx.fillText('Engineer in', 80, 360);

  // 48 Hours pill (highlighted)
  // Measure "in " width to position pill
  ctx.font = '900 84px Inter, system-ui, sans-serif';
  const inText = 'in ';
  const inWidth = ctx.measureText(inText).width;

  // Pill behind "48 Hours"
  const pillX = 80 + inWidth + 5;
  const pillY = 380;
  const pillW = 460;
  const pillH = 95;

  const pillG = ctx.createLinearGradient(pillX, 0, pillX + pillW, 0);
  pillG.addColorStop(0, 'rgba(139, 92, 246, 0.15)');
  pillG.addColorStop(1, 'rgba(99, 102, 241, 0.15)');
  ctx.fillStyle = pillG;
  rr(ctx, pillX, pillY, pillW, pillH, 47);
  ctx.fill();
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  rr(ctx, pillX, pillY, pillW, pillH, 47);
  ctx.stroke();

  // Small clock icon inside pill
  drawSmallClock(ctx, pillX + 50, pillY + pillH / 2, 22, '#8b5cf6');

  // "48 Hours." text inside pill
  ctx.font = '900 76px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#8b5cf6';
  ctx.textBaseline = 'middle';
  ctx.fillText('48 Hours.', pillX + 90, pillY + pillH / 2 + 4);
  ctx.textBaseline = 'alphabetic';

  // === SUB-TEXT ===
  ctx.font = '500 28px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#4b5563';
  ctx.fillText('Pre-vetted. Senior-level. Ready to build.', 80, 530);

  // === FEATURE PILLS (3 pills) ===
  const pillStartY = 600;
  const pillHeight = 75;
  const pillGap = 18;

  // Pill 1: 48-hour matching
  drawPill(ctx, 80, pillStartY, 540, pillHeight,
    (c, x, y, s, col) => drawSmallClock(c, x, y, s, col),
    '48-hour matching', '#8b5cf6');

  // Pill 2: Pre-vetted senior talent
  drawPill(ctx, 640, pillStartY, 480, pillHeight,
    (c, x, y, s, col) => drawShieldCheck(c, x, y, s, col),
    'Pre-vetted talent', '#6366f1');

  // Pill 3: AI/ML expertise
  drawPill(ctx, 80, pillStartY + pillHeight + pillGap, 540, pillHeight,
    (c, x, y, s, col) => drawSpark(c, x, y, s * 0.9, col),
    'Senior AI/ML expertise', '#ec4899');

  // Pill 4: 40-hour free trial
  drawPill(ctx, 640, pillStartY + pillHeight + pillGap, 480, pillHeight,
    (c, x, y, s, col) => drawShieldCheck(c, x, y, s, col),
    '40-hr free trial', '#06b6d4');

  // === WORKSPACE ILLUSTRATION (bottom) ===
  drawWorkspace(ctx, 600, 920, 0.9);

  // === CTA BUTTON ===
  ctx.save();
  ctx.shadowColor = 'rgba(139, 92, 246, 0.4)';
  ctx.shadowBlur = 25;
  ctx.shadowOffsetY = 8;
  const btnG = ctx.createLinearGradient(380, 0, 820, 0);
  btnG.addColorStop(0, '#6366f1');
  btnG.addColorStop(1, '#8b5cf6');
  ctx.fillStyle = btnG;
  rr(ctx, 380, 1100, 440, 70, 35);
  ctx.fill();
  ctx.restore();

  ctx.font = '700 24px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('Get Matched Now →', 600, 1145);
}

// === NEWSFEED 1200 x 627 ===
function drawNewsfeed(ctx, logo) {
  const W = 1200, H = 627;
  drawLightBg(ctx, W, H);

  // Logo top-right
  if (logo) {
    const lh = 44;
    drawLogoColor(ctx, logo, W - 60 - (logo.width / logo.height * lh), 50, lh);
  }

  // Decorative
  drawStarDeco(ctx, 70, 80, 10, '#8b5cf6');
  drawStarDeco(ctx, 720, 100, 8, '#ec4899');

  // === HEADLINE (left) ===
  ctx.textAlign = 'left';
  ctx.font = '900 56px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#1f2937';
  ctx.fillText('Hire an AI/ML', 60, 180);
  ctx.fillText('Engineer in', 60, 250);

  // Pill behind "48 Hours"
  const pillX = 60;
  const pillY = 280;
  const pillW = 380;
  const pillH = 75;

  const pillG = ctx.createLinearGradient(pillX, 0, pillX + pillW, 0);
  pillG.addColorStop(0, 'rgba(139, 92, 246, 0.15)');
  pillG.addColorStop(1, 'rgba(99, 102, 241, 0.15)');
  ctx.fillStyle = pillG;
  rr(ctx, pillX, pillY, pillW, pillH, 37);
  ctx.fill();
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  rr(ctx, pillX, pillY, pillW, pillH, 37);
  ctx.stroke();

  drawSmallClock(ctx, pillX + 42, pillY + pillH / 2, 18, '#8b5cf6');

  ctx.font = '900 56px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#8b5cf6';
  ctx.textBaseline = 'middle';
  ctx.fillText('48 Hours.', pillX + 75, pillY + pillH / 2 + 3);
  ctx.textBaseline = 'alphabetic';

  // Sub-text
  ctx.font = '500 22px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#4b5563';
  ctx.fillText('Pre-vetted. Senior-level. Ready to build.', 60, 410);

  // Feature pills (compact, 2 rows)
  drawPill(ctx, 60, 445, 280, 55,
    (c, x, y, s, col) => drawShieldCheck(c, x, y, s, col),
    'Pre-vetted talent', '#6366f1');
  drawPill(ctx, 360, 445, 280, 55,
    (c, x, y, s, col) => drawSpark(c, x, y, s * 0.9, col),
    'Senior AI/ML', '#ec4899');

  // CTA button
  ctx.save();
  ctx.shadowColor = 'rgba(139, 92, 246, 0.4)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 6;
  const btnG = ctx.createLinearGradient(60, 0, 360, 0);
  btnG.addColorStop(0, '#6366f1');
  btnG.addColorStop(1, '#8b5cf6');
  ctx.fillStyle = btnG;
  rr(ctx, 60, 525, 300, 60, 30);
  ctx.fill();
  ctx.restore();

  ctx.font = '700 20px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('Get Matched Now →', 210, 563);

  // === WORKSPACE ILLUSTRATION (right side) ===
  drawWorkspace(ctx, 950, 320, 0.85);
}

async function init() {
  const logo = await new Promise(r => {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => r(i);
    i.onerror = () => { console.error('Logo failed'); r(null); };
    i.src = LOGO_DATA;
  });

  drawSquare(document.getElementById('c2').getContext('2d'), logo);
  drawNewsfeed(document.getElementById('c1').getContext('2d'), logo);
}
