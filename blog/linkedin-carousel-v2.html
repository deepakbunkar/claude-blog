<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DianApps LinkedIn Carousel V2 - Competitor Gap - Poster Style</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 40px; }
  h1 { color: #fff; font-size: 20px; opacity: 0.4; font-weight: 400; }
  .label { color: #f97316; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  canvas { border: 1px solid #222; max-width: 100%; height: auto; }
  .download-btn { display: inline-block; margin-top: 8px; padding: 10px 24px; background: #f97316; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .download-btn:hover { background: #fb923c; }
  .slide-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<h1>Ad Set 2 — Competitor Gap — Poster Style</h1>

<div class="slide-wrap">
  <div class="label">Slide 1 — Hook</div>
  <canvas id="c1" width="1080" height="1080"></canvas>
  <button class="download-btn" onclick="dl('c1','dianapps-v2-slide1.png')">Download Slide 1</button>
</div>

<div class="slide-wrap">
  <div class="label">Slide 2 — Solution</div>
  <canvas id="c2" width="1080" height="1080"></canvas>
  <button class="download-btn" onclick="dl('c2','dianapps-v2-slide2.png')">Download Slide 2</button>
</div>

<div class="slide-wrap">
  <div class="label">Slide 3 — CTA</div>
  <canvas id="c3" width="1080" height="1080"></canvas>
  <button class="download-btn" onclick="dl('c3','dianapps-v2-slide3.png')">Download Slide 3</button>
</div>

<script>
function dl(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name; a.href = c.toDataURL('image/png'); a.click();
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawWhiteLogo(ctx, logo, x, y, h) {
  if (!logo) return;
  const asp = logo.width/logo.height, w = h*asp;
  const tmp = document.createElement('canvas');
  tmp.width=Math.ceil(w); tmp.height=Math.ceil(h);
  const tc = tmp.getContext('2d');
  tc.drawImage(logo,0,0,w,h);
  tc.globalCompositeOperation='source-atop';
  tc.fillStyle='#ffffff'; tc.fillRect(0,0,w,h);
  ctx.drawImage(tmp, x, y);
}

// --- GRAPHICS ---

function drawRocket(ctx, cx, cy, sc) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.fillStyle='#f97316';
  ctx.beginPath(); ctx.moveTo(0,60); ctx.lineTo(-15,90); ctx.lineTo(0,80); ctx.lineTo(15,90); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fbbf24';
  ctx.beginPath(); ctx.moveTo(0,65); ctx.lineTo(-8,82); ctx.lineTo(0,75); ctx.lineTo(8,82); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.moveTo(0,-60); ctx.quadraticCurveTo(25,-30,25,30); ctx.lineTo(25,55);
  ctx.lineTo(-25,55); ctx.lineTo(-25,30); ctx.quadraticCurveTo(-25,-30,0,-60); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#3b82f6';
  ctx.beginPath(); ctx.arc(0,5,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#60a5fa';
  ctx.beginPath(); ctx.arc(-3,2,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f97316';
  ctx.beginPath(); ctx.moveTo(-25,35); ctx.lineTo(-40,60); ctx.lineTo(-25,55); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(25,35); ctx.lineTo(40,60); ctx.lineTo(25,55); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawTarget(ctx, cx, cy, sc) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.strokeStyle='#f97316'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,25,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#f97316';
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(249,115,22,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(0,-42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,42); ctx.lineTo(0,50); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-50,0); ctx.lineTo(-42,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(42,0); ctx.lineTo(50,0); ctx.stroke();
  ctx.restore();
}

function drawBolt(ctx, cx, cy, sc) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();
  ctx.moveTo(5,-40); ctx.lineTo(-20,5); ctx.lineTo(-5,5);
  ctx.lineTo(-10,40); ctx.lineTo(20,-5); ctx.lineTo(5,-5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawChart(ctx, cx, cy, sc) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  [{x:-30,h:25,c:'#6366f1'},{x:-10,h:40,c:'#f97316'},{x:10,h:55,c:'#22c55e'},{x:30,h:70,c:'#3b82f6'}].forEach(b => {
    ctx.fillStyle=b.c; rr(ctx,b.x-8,35-b.h,16,b.h,4); ctx.fill();
  });
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-30,35); ctx.lineTo(35,-40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,-40); ctx.lineTo(35,-40); ctx.lineTo(35,-25); ctx.stroke();
  ctx.restore();
}

function drawShield(ctx, cx, cy, sc) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.fillStyle='rgba(34,197,94,0.15)';
  ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(40,-30); ctx.lineTo(40,15);
  ctx.quadraticCurveTo(40,45,0,55); ctx.quadraticCurveTo(-40,45,-40,15);
  ctx.lineTo(-40,-30); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#22c55e'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(40,-30); ctx.lineTo(40,15);
  ctx.quadraticCurveTo(40,45,0,55); ctx.quadraticCurveTo(-40,45,-40,15);
  ctx.lineTo(-40,-30); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle='#22c55e'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(-15,5); ctx.lineTo(-5,18); ctx.lineTo(18,-12); ctx.stroke();
  ctx.restore();
}

function corners(ctx) {
  ctx.strokeStyle='rgba(249,115,22,0.15)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(40,80); ctx.lineTo(40,40); ctx.lineTo(80,40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1040,80); ctx.lineTo(1040,40); ctx.lineTo(1000,40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(40,1000); ctx.lineTo(40,1040); ctx.lineTo(80,1040); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1040,1000); ctx.lineTo(1040,1040); ctx.lineTo(1000,1040); ctx.stroke();
}

// ===== SLIDE 1 =====
function s1(ctx, logo) {
  ctx.fillStyle='#0a0f1a'; ctx.fillRect(0,0,1080,1080);
  corners(ctx);

  const rg=ctx.createRadialGradient(540,400,0,540,400,400);
  rg.addColorStop(0,'rgba(249,115,22,0.08)'); rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.fillRect(0,0,1080,1080);

  drawRocket(ctx,540,200,1.8);

  drawWhiteLogo(ctx,logo,60,50,40);
  ctx.font='500 22px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='right';
  ctx.fillText('Swipe to see how →',1020,75);

  ctx.textAlign='center';
  ctx.font='900 54px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText('Your competitors',540,400);
  ctx.fillText('shipped an AI feature',540,468);
  ctx.fillStyle='#f97316';
  ctx.fillText('last quarter.',540,536);

  ctx.strokeStyle='rgba(249,115,22,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(390,575); ctx.lineTo(690,575); ctx.stroke();

  ctx.font='400 42px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('What are you waiting for?',540,640);

  ctx.font='400 30px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText("AI adoption isn't coming — it's already here.",540,740);
  ctx.fillText('The only question is whether',540,790);
  ctx.font='600 30px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText('you lead it or react to it.',540,835);

  ctx.fillStyle='rgba(249,115,22,0.08)';
  rr(ctx,100,920,880,100,16); ctx.fill();
  ctx.strokeStyle='rgba(249,115,22,0.2)'; ctx.lineWidth=1;
  rr(ctx,100,920,880,100,16); ctx.stroke();
  ctx.font='700 28px Inter,system-ui,sans-serif';
  ctx.fillStyle='#f97316';
  ctx.fillText('See how to get ahead in weeks, not years →',540,980);
}

// ===== SLIDE 2 =====
function s2(ctx, logo) {
  ctx.fillStyle='#0a0f1a'; ctx.fillRect(0,0,1080,1080);
  corners(ctx);

  drawWhiteLogo(ctx,logo,60,50,40);
  ctx.font='500 22px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='right';
  ctx.fillText('Swipe to see how →',1020,75);

  ctx.textAlign='center';
  ctx.font='900 42px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText('We show you exactly',540,155);
  ctx.fillStyle='#f97316';
  ctx.fillText('what to build',540,210);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='400 32px Inter,system-ui,sans-serif';
  ctx.fillText('— before you spend a dollar.',540,265);

  // Card A
  var y=330;
  ctx.fillStyle='rgba(255,255,255,0.03)';
  rr(ctx,100,y,880,185,18); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  rr(ctx,100,y,880,185,18); ctx.stroke();
  drawTarget(ctx,195,y+92,0.9);
  ctx.textAlign='left';
  ctx.font='800 16px Inter,system-ui,sans-serif'; ctx.fillStyle='#f97316';
  ctx.fillText('STEP A',270,y+55);
  ctx.font='700 28px Inter,system-ui,sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText('We audit your competitive gap',270,y+92);
  ctx.font='400 22px Inter,system-ui,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText("Where rivals are using AI that you're",270,y+130);
  ctx.fillText("not — yet",270,y+158);

  // Card B
  y=540;
  ctx.fillStyle='rgba(255,255,255,0.03)';
  rr(ctx,100,y,880,185,18); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  rr(ctx,100,y,880,185,18); ctx.stroke();
  drawBolt(ctx,190,y+92,1.3);
  ctx.textAlign='left';
  ctx.font='800 16px Inter,system-ui,sans-serif'; ctx.fillStyle='#f97316';
  ctx.fillText('STEP B',270,y+55);
  ctx.font='700 28px Inter,system-ui,sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText('We identify your fastest AI wins',270,y+92);
  ctx.font='400 22px Inter,system-ui,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText('Features that ship fast',270,y+130);
  ctx.fillText('and hit hard',270,y+158);

  // Card C
  y=750;
  ctx.fillStyle='rgba(255,255,255,0.03)';
  rr(ctx,100,y,880,185,18); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  rr(ctx,100,y,880,185,18); ctx.stroke();
  drawChart(ctx,190,y+92,1.2);
  ctx.textAlign='left';
  ctx.font='800 16px Inter,system-ui,sans-serif'; ctx.fillStyle='#f97316';
  ctx.fillText('STEP C',270,y+55);
  ctx.font='700 28px Inter,system-ui,sans-serif'; ctx.fillStyle='#ffffff';
  ctx.fillText('You get a move-now action plan',270,y+92);
  ctx.font='400 22px Inter,system-ui,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText('Priorities, timeline, and cost',270,y+130);
  ctx.fillText('— no guesswork',270,y+158);

  ctx.textAlign='center';
  ctx.font='500 24px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('No fluff. No overwhelm. Just your clearest next move.',540,1010);
}

// ===== SLIDE 3 =====
function s3(ctx, logo) {
  ctx.fillStyle='#0a0f1a'; ctx.fillRect(0,0,1080,1080);
  corners(ctx);

  const rg=ctx.createRadialGradient(540,480,0,540,480,400);
  rg.addColorStop(0,'rgba(249,115,22,0.1)'); rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.fillRect(0,0,1080,1080);

  if (logo) {
    const lh=48, asp=logo.width/logo.height, lw=lh*asp;
    drawWhiteLogo(ctx,logo,540-lw/2,55,lh);
  }
  ctx.font='500 22px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='right';
  ctx.fillText('3/3',1020,85);

  drawShield(ctx,540,230,1.8);

  ctx.textAlign='center';
  ctx.font='900 42px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText("Don't let another quarter pass",540,380);
  ctx.fillText('while your competitors',540,435);
  ctx.fillStyle='#f97316';
  ctx.fillText('pull ahead.',540,490);

  ctx.save();
  ctx.shadowColor='rgba(249,115,22,0.35)'; ctx.shadowBlur=35; ctx.shadowOffsetY=8;
  ctx.fillStyle='#f97316';
  rr(ctx,210,560,660,100,50); ctx.fill();
  ctx.restore();
  ctx.font='800 36px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff'; ctx.textAlign='center';
  ctx.fillText('Book My Free AI Audit',540,622);

  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(200,730); ctx.lineTo(880,730); ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,0.04)';
  rr(ctx,140,760,800,45,22); ctx.fill();
  ctx.font='400 19px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.fillText('40+ AI products shipped  |  USA & Australia  |  End-to-end delivery',540,790);

  ctx.font='700 30px Inter,system-ui,sans-serif'; ctx.fillStyle='#f97316';
  ctx.fillText('Free, fast, and zero obligation.',540,880);
  ctx.font='400 26px Inter,system-ui,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText('Walk away with a plan',540,940);
  ctx.fillText('you can act on today.',540,978);
}

async function init() {
  const logo = await new Promise(r => {
    const i=new Image(); i.crossOrigin='anonymous';
    i.onload=()=>r(i); i.onerror=()=>r(null);
    i.src=LOGO_DATA;
  });
  s1(document.getElementById('c1').getContext('2d'),logo);
  s2(document.getElementById('c2').getContext('2d'),logo);
  s3(document.getElementById('c3').getContext('2d'),logo);
