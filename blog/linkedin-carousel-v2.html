<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DianApps LinkedIn Carousel V2 - Competitor Gap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 40px; }
  h1 { color: #fff; font-size: 20px; opacity: 0.4; font-weight: 400; }
  .label { color: #67e8f9; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  canvas { border: 1px solid #222; max-width: 100%; height: auto; }
  .download-btn { display: inline-block; margin-top: 8px; padding: 10px 24px; background: linear-gradient(135deg,#6366f1,#06b6d4); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .download-btn:hover { opacity: 0.9; }
  .slide-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<h1>Ad Set 2 — Competitor Gap — Gradient Mesh Style</h1>

<div class="slide-wrap">
  <div class="label">Slide 1 — Hook</div>
  <canvas id="c1" width="1080" height="1080"></canvas>
  <button class="download-btn" onclick="dl('c1','dianapps-v2-slide1.png')">Download Slide 1</button>
</div>

<div class="slide-wrap">
  <div class="label">Slide 2 — Solution</div>
  <canvas id="c2" width="1080" height="1080"></canvas>
  <button class="download-btn" onclick="dl('c2','dianapps-v2-slide2.png')">Download Slide 2</button>
</div>

<div class="slide-wrap">
  <div class="label">Slide 3 — CTA</div>
  <canvas id="c3" width="1080" height="1080"></canvas>
  <button class="download-btn" onclick="dl('c3','dianapps-v2-slide3.png')">Download Slide 3</button>
</div>

<script>
function dl(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name; a.href = c.toDataURL('image/png'); a.click();
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function blob(ctx, x, y, r, color, opacity) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'transparent');
  ctx.save(); ctx.globalAlpha = opacity;
  ctx.fillStyle = g;
  ctx.fillRect(x-r, y-r, r*2, r*2);
  ctx.restore();
}

function meshBg(ctx, v) {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, 1080, 1080);
  if (v===1) {
    blob(ctx,150,200,400,'#6366f1',0.35);
    blob(ctx,900,100,350,'#06b6d4',0.25);
    blob(ctx,500,800,450,'#8b5cf6',0.2);
    blob(ctx,1000,900,300,'#0ea5e9',0.15);
    blob(ctx,50,700,250,'#ec4899',0.1);
  } else if (v===2) {
    blob(ctx,900,300,400,'#8b5cf6',0.3);
    blob(ctx,100,600,380,'#06b6d4',0.25);
    blob(ctx,540,200,300,'#6366f1',0.15);
    blob(ctx,200,950,350,'#0ea5e9',0.2);
    blob(ctx,950,800,250,'#ec4899',0.08);
  } else {
    blob(ctx,540,300,500,'#6366f1',0.35);
    blob(ctx,200,600,350,'#06b6d4',0.2);
    blob(ctx,850,700,400,'#8b5cf6',0.25);
    blob(ctx,100,150,250,'#0ea5e9',0.15);
    blob(ctx,900,100,300,'#ec4899',0.1);
  }
  ctx.save(); ctx.globalAlpha = 0.03;
  for (let i = 0; i < 8000; i++) {
    ctx.fillStyle = Math.random()>0.5?'#fff':'#000';
    ctx.fillRect(Math.random()*1080, Math.random()*1080, 1, 1);
  }
  ctx.restore();
}

function drawWhiteLogo(ctx, logo, x, y, h) {
  if (!logo) return;
  const asp = logo.width/logo.height;
  const w = h*asp;
  const tmp = document.createElement('canvas');
  tmp.width=Math.ceil(w); tmp.height=Math.ceil(h);
  const tc = tmp.getContext('2d');
  tc.drawImage(logo,0,0,w,h);
  tc.globalCompositeOperation='source-atop';
  tc.fillStyle='#ffffff';
  tc.fillRect(0,0,w,h);
  ctx.drawImage(tmp, x, y);
}

function topBar(ctx, logo, txt) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(0,0,1080,100);
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,100); ctx.lineTo(1080,100); ctx.stroke();
  drawWhiteLogo(ctx,logo,50,28,44);
  ctx.font='500 22px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.textAlign='right';
  ctx.fillText(txt, 1030, 60);
}

// ===== SLIDE 1 =====
function s1(ctx, logo) {
  meshBg(ctx,1);
  topBar(ctx,logo,'Swipe to see how →');

  ctx.textAlign='left';
  ctx.font='900 62px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText('Your competitors',70,230);
  ctx.fillText('shipped an AI',70,305);
  ctx.fillText('feature',70,380);
  ctx.fillStyle='#67e8f9';
  ctx.fillText('last quarter.',330,380);

  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='400 46px Inter,system-ui,sans-serif';
  ctx.fillText('What are you waiting for?',70,475);

  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(70,530); ctx.lineTo(500,530); ctx.stroke();

  ctx.font='400 34px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText("AI adoption isn't coming —",70,610);
  ctx.fillText("it's already here.",70,658);
  ctx.fillText('The only question is whether',70,740);
  ctx.fillStyle='#ffffff';
  ctx.font='600 34px Inter,system-ui,sans-serif';
  ctx.fillText('you lead it or react to it.',70,790);

  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.06)';
  rr(ctx,50,890,980,130,20); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  rr(ctx,50,890,980,130,20); ctx.stroke();
  ctx.restore();

  ctx.font='700 30px Inter,system-ui,sans-serif';
  ctx.fillStyle='#67e8f9'; ctx.textAlign='center';
  ctx.fillText('See how to get ahead',540,945);
  ctx.fillText('in weeks, not years →',540,988);
}

// ===== SLIDE 2 =====
function s2(ctx, logo) {
  meshBg(ctx,2);
  topBar(ctx,logo,'Swipe to see how →');

  ctx.textAlign='left';
  ctx.font='900 46px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText('We show you exactly',70,200);
  ctx.fillStyle='#67e8f9';
  ctx.fillText('what to build',70,260);
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.font='400 34px Inter,system-ui,sans-serif';
  ctx.fillText('— before you spend a dollar.',70,318);

  [{l:'A',t:'We audit your competitive gap',s:"Where rivals are using AI that you're not — yet",y:390},
   {l:'B',t:'We identify your fastest AI wins',s:'Features that ship fast and hit hard',y:565},
   {l:'C',t:'You get a move-now action plan',s:'Priorities, timeline, and cost — no guesswork',y:740}
  ].forEach(function(c) {
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.05)';
    rr(ctx,50,c.y,980,150,18); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    rr(ctx,50,c.y,980,150,18); ctx.stroke();
    ctx.restore();

    ctx.font='900 80px Inter,system-ui,sans-serif';
    ctx.fillStyle='rgba(103,232,249,0.12)';
    ctx.textAlign='left';
    ctx.fillText(c.l, 75, c.y+105);

    ctx.font='700 28px Inter,system-ui,sans-serif';
    ctx.fillStyle='#ffffff';
    ctx.fillText(c.t, 155, c.y+65);

    ctx.font='400 22px Inter,system-ui,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillText(c.s, 155, c.y+105);
  });

  ctx.textAlign='center';
  ctx.font='500 26px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('No fluff. No overwhelm. Just your clearest next move.',540,970);
}

// ===== SLIDE 3 =====
function s3(ctx, logo) {
  meshBg(ctx,3);
  topBar(ctx,logo,'3/3');

  ctx.textAlign='center';
  ctx.font='900 44px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText("Don't let another quarter",540,250);
  ctx.fillText('pass while your competitors',540,310);
  ctx.fillStyle='#67e8f9';
  ctx.fillText('pull ahead.',540,370);

  ctx.save();
  ctx.shadowColor='rgba(6,182,212,0.4)';
  ctx.shadowBlur=40; ctx.shadowOffsetY=10;
  const bg=ctx.createLinearGradient(180,0,900,0);
  bg.addColorStop(0,'#6366f1'); bg.addColorStop(0.5,'#8b5cf6'); bg.addColorStop(1,'#06b6d4');
  ctx.fillStyle=bg;
  rr(ctx,180,450,720,110,55); ctx.fill();
  ctx.restore();

  ctx.font='800 38px Inter,system-ui,sans-serif';
  ctx.fillStyle='#ffffff'; ctx.textAlign='center';
  ctx.fillText('Book My Free AI Audit',540,518);

  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.04)';
  rr(ctx,140,630,800,55,28); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  rr(ctx,140,630,800,55,28); ctx.stroke();
  ctx.restore();

  ctx.font='400 20px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('40+ AI products shipped  |  USA & Australia  |  End-to-end delivery',540,665);

  ctx.font='700 32px Inter,system-ui,sans-serif';
  ctx.fillStyle='#67e8f9';
  ctx.fillText('Free, fast, and zero obligation.',540,790);

  ctx.font='400 28px Inter,system-ui,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText('Walk away with a plan',540,860);
  ctx.fillText('you can act on today.',540,902);

  if (logo) {
    const h=36, asp=logo.width/logo.height, w=h*asp;
    drawWhiteLogo(ctx,logo,540-w/2,975,h);
  }
}

async function init() {
  const logo = await new Promise(r => {
    const i=new Image(); i.crossOrigin='anonymous';
    i.onload=()=>r(i); i.onerror=()=>r(null);
    i.src=LOGO_DATA;
  });
  s1(document.getElementById('c1').getContext('2d'),logo);
  s2(document.getElementById('c2').getContext('2d'),logo);
  s3(document.getElementById('c3').getContext('2d'),logo);
}
