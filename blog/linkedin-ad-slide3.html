<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Slide 3</title></head>
<body style="margin:0;padding:0;background:#000;">
<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" style="max-width:1080px;">
  <defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg3)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="270" x2="1080" y2="270" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <line x1="540" y1="0" x2="540" y2="1080" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="810" y1="0" x2="810" y2="1080" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Large accent glow center -->
  <circle cx="540" cy="440" r="250" fill="#6366f1" opacity="0.06"/>
  <circle cx="540" cy="440" r="150" fill="#8b5cf6" opacity="0.04"/>

  <!-- Top bar -->
  <rect x="80" y="80" width="60" height="4" rx="2" fill="url(#accent3)"/>
  <text x="980" y="100" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" opacity="0.25">3/3</text>

  <!-- Main text -->
  <text x="540" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff">

    <tspan x="540" dy="68">what AI can do</tspan>

  </text>

  <rect x="240" y="560" width="600" height="90" rx="45" fill="url(#btnGrad)"/>
  <text x="540" y="616" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#ffffff">Get Your Free AI Audit</text>

  <text x="540" y="700" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#a5b4fc" opacity="0.8">dianapps.com/contact-us</text>

  <!-- Trust signals -->
  <rect x="180" y="790" width="720" height="1" fill="#ffffff" opacity="0.06"/>

  <text x="540" y="850" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" opacity="0.35">40+ AI products shipped  |  USA & Australia  |  End-to-end delivery</text>

  <!-- Bottom tagline -->
  <text x="540" y="940" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#ffffff" opacity="0.5">No commitment. No pitch deck.</text>
  <text x="540" y="975" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#ffffff" opacity="0.5">Just clarity on what's possible.</text>

  <!-- Bottom logo -->
  <text x="540" y="1040" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" opacity="0.4">DianApps</text>
